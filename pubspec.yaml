name: flutter_application_1
description: CloudForest IT Solutions - ISP Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Navigation
  go_router: ^13.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Networking (ready for API integration)
  http: ^1.2.0
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Network Connectivity
  connectivity_plus: ^5.0.2
  
  # Image Picker (Camera/Gallery)
  image_picker: ^1.0.4
  
  # UI Components
  google_fonts: ^6.1.0
  lucide_icons: ^0.257.0
  
  # Utils
  intl: ^0.19.0
  
  # ML/AI for Document Validation
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_face_detection: ^0.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/